<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><style>
  #app { padding: 1rem 0; font-family: var(--font-sans); }
  canvas { display: block; margin: 0 auto; cursor: crosshair; }
  .info-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 12px 0 6px; }
  .info-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; min-width: 110px; text-align: center; }
  .info-card .label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .info-card .val { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
  .toggles { display: flex; gap: 8px; justify-content: center; margin: 8px 0 0; flex-wrap: wrap; }
  .tog-btn { padding: 5px 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 12px; cursor: pointer; color: var(--color-text-secondary); transition: background 0.15s, color 0.15s; }
  .tog-btn.active-red  { background: #E8593C; color: #fff; border-color: #E8593C; }
  .tog-btn.active-blue { background: #3B8BD4; color: #fff; border-color: #3B8BD4; }
  .tog-btn.active-gray { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .divider { width: 1px; background: var(--color-border-tertiary); margin: 0 2px; }
  .controls { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 8px; font-size: 13px; color: var(--color-text-secondary); flex-wrap: wrap; }
  input[type=range] { width: 180px; }
  .msg { text-align: center; font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; min-height: 18px; }
</style>
</head><body><div id="app">
  <h2 class="sr-only">Unit circle showing sin has two angle solutions</h2>
  <canvas id="c" width="500" height="500"></canvas>
  <div class="info-row">
    <div class="info-card"><div class="label">θ — Angle 1 <span style="color:#E8593C">●</span></div><div class="val" style="color:#E8593C" id="a1">61°</div></div>
    <div class="info-card"><div class="label">α — Angle 2 <span style="color:#3B8BD4">●</span></div><div class="val" style="color:#3B8BD4" id="a2">—</div></div>
    <div class="info-card"><div class="label">sin (both)</div><div class="val" id="sv">0.875</div></div>
  </div>
  <div class="toggles">
    <button class="tog-btn active-red" id="btn1" onclick="toggleAngle(1)">Angle 1 (θ)</button>
    <button class="tog-btn" id="btn2" onclick="toggleAngle(2)">Angle 2 (α)</button>
    <div class="divider"></div>
    <button class="tog-btn active-gray" id="btnH" onclick="toggleLabel(&#39;hyp&#39;)">hyp = 1</button>
    <button class="tog-btn active-gray" id="btnO" onclick="toggleLabel(&#39;opp&#39;)">opp = y</button>
    <button class="tog-btn" id="btnT2" onclick="toggleLabel('theta2')">show θ₂</button>
    <button class="tog-btn" id="btnC"  onclick="toggleLabel('coords')">show coords</button>
  </div>
  <div class="controls">
    <span>Drag angle:</span>
    <input type="range" id="slider" min="0" max="180" value="30">
    <span id="sl-val">61°</span>
  </div>
  <p class="msg" id="msg">Showing <span style="color:#E8593C">angle 1 (θ)</span> only.</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=500, H=500, cx=W/2, cy=H/2, R=170;
const slider = document.getElementById('slider');
let show1=true, show2=true, showHyp=true, showOpp=true, showTheta2=false, showCoords=false;

function isDark(){return window.matchMedia('(prefers-color-scheme: dark)').matches;}
function gc(){return isDark()
  ?{fg:'#c2c0b6',axis:'#666',circle:'#777',sinLine:'#c8c820',hypRed:'#E8A090',hypBlue:'#7ab8e8'}
  :{fg:'#3d3d3a',axis:'#bbb',circle:'#999',sinLine:'#707020',hypRed:'#C04428',hypBlue:'#185FA5'};}

function toggleAngle(n){
  if(n===1){show1=!show1;if(!show1&&!show2)show2=true;}
  else     {show2=!show2;if(!show1&&!show2)show1=true;}
  document.getElementById('btn1').className='tog-btn'+(show1?' active-red':'');
  document.getElementById('btn2').className='tog-btn'+(show2?' active-blue':'');
  updateMsg(); draw(parseInt(slider.value));
}
function toggleLabel(w){
  if(w==='hyp')   {showHyp=!showHyp;   document.getElementById('btnH').className='tog-btn'+(showHyp?' active-gray':'');}
  if(w==='opp')   {showOpp=!showOpp;   document.getElementById('btnO').className='tog-btn'+(showOpp?' active-gray':'');}
  if(w==='theta2'){showTheta2=!showTheta2; document.getElementById('btnT2').className='tog-btn'+(showTheta2?' active-blue':'');}
  if(w==='coords'){showCoords=!showCoords;  document.getElementById('btnC').className='tog-btn'+(showCoords?' active-red':'');}
  draw(parseInt(slider.value));
}
function updateMsg(){
  const m=document.getElementById('msg');
  if(show1&&show2) m.innerHTML='Both θ and α share the same sin — same y-coordinate on the unit circle.';
  else if(show1)   m.innerHTML='Showing <span style="color:#E8593C">angle 1 (θ)</span> only.';
  else             m.innerHTML='Showing <span style="color:#3B8BD4">angle 2 (α)</span> only.';
}

function arrowHead(px,py,angle,col){
  ctx.save();ctx.translate(px,py);ctx.rotate(angle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-8,4);ctx.lineTo(-8,-4);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();ctx.restore();
}

function draw(deg){
  const c=gc();
  ctx.clearRect(0,0,W,H);
  const d=Math.max(0,Math.min(180,deg));
  const rad=d*Math.PI/180;
  const sinVal=Math.sin(rad);
  const cosVal=Math.cos(rad); // positive for d<90, negative for d>90

  // Red point: angle d from +x axis
  const x1=cx+R*cosVal;
  const y1=cy-R*sinVal;
  // Blue point: mirror about y-axis
  const x2=cx-R*cosVal;
  const y2=y1;

  // Red is in Q2 when d>90 (cosVal<0 → x1<cx)
  // Blue is in Q1 when d>90 (cosVal<0 → -cosVal>0 → x2>cx)
  const redInQ2 = d > 90;   // red crossed y-axis into Q2
  const blueInQ1 = d > 90;  // blue crossed y-axis into Q1

  const yCoord=y1;
  const isZero=d===0, is180=d===180;

  if(show1||show2){
    ctx.save();ctx.setLineDash([5,4]);
    ctx.strokeStyle=isDark()?'#a0a020':'#888820';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(cx-R-16,yCoord);ctx.lineTo(cx+R+72,yCoord);ctx.stroke();
    ctx.restore();
  }

  ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
  ctx.strokeStyle=c.circle;ctx.lineWidth=1.5;ctx.stroke();

  ctx.strokeStyle=c.axis;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(cx-R-30,cy);ctx.lineTo(cx+R+24,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+R+30);ctx.lineTo(cx,cy-R-24);ctx.stroke();
  arrowHead(cx+R+24,cy,0,c.axis);
  arrowHead(cx,cy-R-24,-Math.PI/2,c.axis);
  ctx.font='italic 500 15px var(--font-sans,sans-serif)';
  ctx.fillStyle=c.fg;ctx.textAlign='left';
  ctx.fillText('x',cx+R+30,cy+5);
  ctx.fillText('y',cx+7,cy-R-28);
  ctx.font='12px var(--font-sans,sans-serif)';
  ctx.fillStyle=isDark()?'#555':'#ccc';
  ctx.fillText('O',cx+5,cy+14);

  if(isZero||is180){
    ctx.font='500 13px var(--font-sans,sans-serif)';
    ctx.fillStyle=isDark()?'#aaa':'#777';ctx.textAlign='center';
    ctx.fillText(isZero?'sin 0° = 0':'sin 180° = 0',cx,cy-R-38);
    const px=isZero?cx+R:cx-R;
    ctx.beginPath();ctx.arc(px,cy,7,0,2*Math.PI);
    ctx.fillStyle='#E8593C';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='12px var(--font-sans,sans-serif)';
    ctx.fillStyle=isDark()?'#aaa':'#777';ctx.textAlign='center';
    ctx.fillText(isZero?'(1, 0)':'(-1, 0)',px,cy+20);
    ctx.font='500 12px var(--font-sans,sans-serif)';
    ctx.fillStyle=c.sinLine;ctx.textAlign='left';
    ctx.fillText('sin θ = 0.000',cx+R+18,yCoord+4);
    document.getElementById('a1').textContent=d+'°';
    document.getElementById('a2').textContent=(180-d)+'°';
    document.getElementById('sv').textContent='0.000';
    document.getElementById('sl-val').textContent=d+'°';
    return;
  }

  const arcR=Math.min(R*0.20,36);
  // When red is in Q2, we need a slightly smaller arc for α so it doesn't overlap θ
  const arcR2=arcR*0.75;

  // ---- RED triangle ----
  if(show1){
    const fx1=x1, fy1=cy;

    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx1,fy1);ctx.lineTo(x1,y1);ctx.closePath();
    ctx.fillStyle=isDark()?'rgba(232,89,60,0.12)':'rgba(232,89,60,0.07)';ctx.fill();ctx.restore();

    ctx.save();ctx.strokeStyle=isDark()?'rgba(232,89,60,0.35)':'rgba(232,89,60,0.28)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx1,fy1);ctx.stroke();ctx.restore();

    ctx.save();ctx.strokeStyle='#E8593C';ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(fx1,fy1);ctx.lineTo(x1,y1);ctx.stroke();ctx.restore();

    const rm=8, hDir=fx1>cx?-1:1;
    ctx.save();ctx.strokeStyle=isDark()?'rgba(232,89,60,0.55)':'rgba(232,89,60,0.45)';
    ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(fx1+hDir*rm,fy1);ctx.lineTo(fx1+hDir*rm,fy1-rm);ctx.lineTo(fx1,fy1-rm);ctx.stroke();ctx.restore();

    ctx.save();ctx.strokeStyle='#E8593C';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x1,y1);ctx.stroke();ctx.restore();

    if(showHyp){
      const hMx=(cx+x1)/2,hMy=(cy+y1)/2,hAng=Math.atan2(y1-cy,x1-cx);
      ctx.save();ctx.translate(hMx,hMy);ctx.rotate(hAng);
      ctx.font='500 12px var(--font-sans,sans-serif)';ctx.fillStyle=c.hypRed;ctx.textAlign='center';
      ctx.fillText('hyp = 1',0,-8);ctx.restore();
    }
    if(showOpp){
      const oMy=(cy+y1)/2, oX=fx1>cx?fx1+7:fx1-7;
      ctx.font='500 12px var(--font-sans,sans-serif)';ctx.fillStyle='#E8593C';
      ctx.textAlign=fx1>cx?'left':'right';
      ctx.fillText('opp = '+sinVal.toFixed(3),oX,oMy-4);
      ctx.font='12px var(--font-sans,sans-serif)';ctx.fillStyle=isDark()?'#aaa':'#888';
      ctx.fillText('(sin θ)',oX,oMy+10);
    }

    // θ arc: from +x (angle 0) sweeping up to hyp (angle -rad), anticlockwise=true
    ctx.save();ctx.strokeStyle='#E8593C';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(cx,cy,arcR,0,-rad,true);ctx.stroke();ctx.restore();

    // θ label at midpoint of θ arc
    const tMid=-rad/2, tLR=arcR+16;
    ctx.font='15px serif';ctx.fillStyle='#E8593C';ctx.textAlign='center';
    ctx.fillText('θ',cx+tLR*Math.cos(tMid),cy+tLR*Math.sin(tMid)+5);
    ctx.font='12px var(--font-sans,sans-serif)';
    ctx.fillText(d+'°',cx+(tLR+14)*Math.cos(tMid),cy+(tLR+14)*Math.sin(tMid)+4);

    // α arc on red: ONLY when red is in Q2 (d>90)
    // Shows the acute angle between -x axis and the red hyp
    // -x axis = canvas angle π. Red hyp in Q2 is at angle π+rad... 
    // Wait: red hyp direction when d>90: x1<cx, y1<cy
    // atan2(y1-cy, x1-cx) = atan2(-sinVal, cosVal) where cosVal<0 for d>90
    // = atan2(-sinVal, cosVal): sinVal>0, cosVal<0 → Q2 in atan2 → angle in (π/2,π) range... negative
    // Simpler: red hyp canvas angle = -rad (same formula as always, since arc(0,-rad,true) works)
    // When d>90, -rad is in (-π, -π/2) = upper-left in canvas
    // Acute angle from -x axis: -x axis = π. Hyp = -rad = -(π - acuteRed) where acuteRed = π-rad
    // acuteRed = π - rad (the supplement)
    // Arc from π going clockwise (increasing canvas angle = anticlockwise=false) toward -rad+2π
    // -rad+2π for d=120: -2π/3+2π = 4π/3. Arc from π to 4π/3 clockwise = 60° arc ✓ (180-120=60)
    if(redInQ2){
      const acuteRed = Math.PI - rad; // acute angle in radians
      const redHypPosAngle = -rad + 2*Math.PI; // equivalent positive canvas angle of red hyp
      ctx.save();ctx.strokeStyle='#E8593C';ctx.lineWidth=1.5;ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(cx,cy,arcR2,Math.PI,redHypPosAngle,false);ctx.stroke();ctx.restore();

      // α label at midpoint: (π + redHypPosAngle)/2
      const a2Mid=(Math.PI+redHypPosAngle)/2;
      const a2LR=arcR2+14;
      ctx.font='14px serif';ctx.fillStyle='#E8593C';ctx.textAlign='center';
      ctx.fillText('α',cx+a2LR*Math.cos(a2Mid),cy+a2LR*Math.sin(a2Mid)+5);
      ctx.font='11px var(--font-sans,sans-serif)';
      ctx.fillText((180-d)+'°',cx+(a2LR+13)*Math.cos(a2Mid),cy+(a2LR+13)*Math.sin(a2Mid)+4);
    }

    ctx.beginPath();ctx.arc(x1,y1,7,0,2*Math.PI);
    ctx.fillStyle='#E8593C';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();

    if(showCoords){
      const coordX = redInQ2 ? x1 - 10 : x1 + 10;
      const coordAlign = redInQ2 ? 'right' : 'left';
      const coordY = y1 - 14;
      const xLabel = redInQ2 ? '\u2212x' : 'x';
      ctx.font='500 12px var(--font-sans,sans-serif)';
      ctx.fillStyle='#E8593C';
      ctx.textAlign=coordAlign;
      ctx.fillText('('+xLabel+', '+sinVal.toFixed(3)+')',coordX,coordY);
    }
  }

  // ---- BLUE triangle ----
  if(show2){
    const fx2=x2, fy2=cy;

    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx2,fy2);ctx.lineTo(x2,y2);ctx.closePath();
    ctx.fillStyle=isDark()?'rgba(59,139,212,0.12)':'rgba(59,139,212,0.07)';ctx.fill();ctx.restore();

    ctx.save();ctx.strokeStyle=isDark()?'rgba(59,139,212,0.35)':'rgba(59,139,212,0.28)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx2,fy2);ctx.stroke();ctx.restore();

    ctx.save();ctx.strokeStyle='#3B8BD4';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(fx2,fy2);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();

    const rm2=8;
    ctx.save();ctx.strokeStyle=isDark()?'rgba(59,139,212,0.55)':'rgba(59,139,212,0.45)';
    ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(fx2+rm2,fy2);ctx.lineTo(fx2+rm2,fy2-rm2);ctx.lineTo(fx2,fy2-rm2);ctx.stroke();ctx.restore();

    ctx.save();ctx.strokeStyle='#3B8BD4';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();

    if(showHyp){
      const hMx2=(cx+x2)/2,hMy2=(cy+y2)/2,hAng2=Math.atan2(y2-cy,x2-cx);
      ctx.save();ctx.translate(hMx2,hMy2);ctx.rotate(hAng2);
      ctx.font='500 12px var(--font-sans,sans-serif)';ctx.fillStyle=c.hypBlue;ctx.textAlign='center';
      ctx.fillText('hyp = 1',0,-8);ctx.restore();
    }
    if(showOpp){
      const oMy2=(cy+y2)/2;
      ctx.font='500 12px var(--font-sans,sans-serif)';ctx.fillStyle='#3B8BD4';ctx.textAlign='right';
      ctx.fillText('opp = '+sinVal.toFixed(3),fx2-7,oMy2-4);
      ctx.font='12px var(--font-sans,sans-serif)';ctx.fillStyle=isDark()?'#aaa':'#888';
      ctx.fillText('(sin α)',fx2-7,oMy2+10);
    }

    // α arc on blue: ONLY when blue is in Q2 (d<90, meaning cosVal>0, x2<cx)
    // Blue hyp in Q2 when d<90: x2=cx-R*cosVal<cx, y2=cy-R*sinVal<cy → upper-left
    // Blue hyp canvas angle = π+rad (past -x axis by rad, going clockwise in canvas)
    // Arc from π to π+rad, anticlockwise=false (clockwise) = rad-wide arc inside triangle ✓
    if(!blueInQ1){
      const blueHypAngle=Math.PI+rad;
      ctx.save();ctx.strokeStyle='#3B8BD4';ctx.lineWidth=2;ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(cx,cy,arcR,Math.PI,blueHypAngle,false);ctx.stroke();ctx.restore();

      const aMid=Math.PI+rad/2, aLR=arcR+16;
      ctx.font='15px serif';ctx.fillStyle='#3B8BD4';ctx.textAlign='center';
      ctx.fillText('α',cx+aLR*Math.cos(aMid),cy+aLR*Math.sin(aMid)+5);
      ctx.font='12px var(--font-sans,sans-serif)';
      ctx.fillText(d+'°',cx+(aLR+14)*Math.cos(aMid),cy+(aLR+14)*Math.sin(aMid)+4);
    }

    // θ₂ arc: full angle from +x to blue hyp, dashed, toggled
    if(showTheta2){
      const theta2ArcR=arcR+14;
      ctx.save();ctx.strokeStyle='rgba(59,139,212,0.55)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(cx,cy,theta2ArcR,0,rad-Math.PI,true);ctx.stroke();ctx.restore();
      const t2Mid=-(Math.PI-rad)/2, t2LR=theta2ArcR+16;
      ctx.font='14px serif';ctx.fillStyle='rgba(59,139,212,0.85)';ctx.textAlign='center';
      ctx.fillText('θ₂',cx+t2LR*Math.cos(t2Mid),cy+t2LR*Math.sin(t2Mid)+5);
      ctx.font='11px var(--font-sans,sans-serif)';
      ctx.fillText((180-d)+'°',cx+(t2LR+14)*Math.cos(t2Mid),cy+(t2LR+14)*Math.sin(t2Mid)+4);
    }

    ctx.beginPath();ctx.arc(x2,y2,7,0,2*Math.PI);
    ctx.fillStyle='#3B8BD4';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }

  if(show1||show2){
    ctx.font='500 12px var(--font-sans,sans-serif)';
    ctx.fillStyle=c.sinLine;ctx.textAlign='left';
    ctx.fillText('sin θ = '+sinVal.toFixed(3),cx+R+18,yCoord+4);
    ctx.beginPath();ctx.moveTo(cx-5,yCoord);ctx.lineTo(cx+5,yCoord);
    ctx.strokeStyle=c.sinLine;ctx.lineWidth=1.5;ctx.stroke();
  }

  document.getElementById('a1').textContent=show1?d+'°':'—';
  document.getElementById('a2').textContent=show2?(180-d)+'°':'—';
  document.getElementById('sv').textContent=sinVal.toFixed(3);
  document.getElementById('sl-val').textContent=d+'°';
}

let dragging=false;
function angleFromEvent(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  const ex=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const ey=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  const dx=ex*sx-cx,dy=ey*sy-cy;
  let a=Math.round(-Math.atan2(dy,dx)*180/Math.PI);
  return Math.max(0,Math.min(180,a));
}
canvas.addEventListener('mousedown',e=>{dragging=true;const a=angleFromEvent(e);slider.value=a;draw(a);});
canvas.addEventListener('mousemove',e=>{if(!dragging)return;const a=angleFromEvent(e);slider.value=a;draw(a);});
window.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const a=angleFromEvent(e);slider.value=a;draw(a);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const a=angleFromEvent(e);slider.value=a;draw(a);},{passive:false});
slider.addEventListener('input',()=>draw(parseInt(slider.value)));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>draw(parseInt(slider.value)));
draw(30);
</script>
</body></html>
